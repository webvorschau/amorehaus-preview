/* ===== DAME DETAIL MODAL ===== */
function DameModal({ dame, onClose }) {
  const [imgIdx, setImgIdx] = useState(0);
  const imgs = dame.imgs || [dame.img];
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const prevImg = (e) => { e.stopPropagation(); setImgIdx(i => i === 0 ? imgs.length - 1 : i - 1); };
  const nextImg = (e) => { e.stopPropagation(); setImgIdx(i => i === imgs.length - 1 ? 0 : i + 1); };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
      <div className="relative bg-[#1a1a1a] border border-[#333] rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto scrollbar-hide" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-4 right-4 z-10 text-white/70 hover:text-white bg-black/50 rounded-full p-2">

        <div className="relative h-80 sm:h-96 w-full">
          <img src={imgs[imgIdx]} alt={dame.name} className="w-full h-full object-cover transition-opacity duration-300" />
          <div className="absolute inset-0 bg-gradient-to-t from-[#1a1a1a] via-transparent to-transparent"></div>

          {imgs.length > 1 && (
            <>
              <button onClick={prevImg} className="absolute left-3 top-1/2 -translate-y-1/2 z-10 bg-black/60 hover:bg-black/80 text-white rounded-full p-2 transition-colors">
                <ChevronLeft size={24} />
              </button>
              <button onClick={nextImg} className="absolute right-3 top-1/2 -translate-y-1/2 z-10 bg-black/60 hover:bg-black/80 text-white rounded-full p-2 transition-colors">
                <ChevronRight size={24} />
              </button>
              <div className="absolute bottom-16 left-1/2 -translate-x-1/2 z-10 flex gap-2">
                {imgs.map((_, i) => (
                  <button key={i} onClick={(e) => { e.stopPropagation(); setImgIdx(i); }} className={`w-2.5 h-2.5 rounded-full transition-colors ${i === imgIdx ? 'bg-[#C5A059]' : 'bg-white/40 hover:bg-white/70'}`} />

                <div className="w-full bg-gradient-to-r from-[#D4AF37] via-[#F3E5AB] to-[#D4AF37] text-black font-semibold py-3 rounded text-center group-hover:brightness-110 transition-all shadow-md">
                  Profil & Details

              </div>
            </div>
          ))}
        </div>

        {/* EROTIKMASSAGE SECTION */}
        <div className="mt-16 bg-[#1a1a1a] border border-[#C5A059]/30 rounded-lg p-8 text-center shadow-lg">

          <h2 className="text-3xl md:text-4xl mb-3" style={{fontFamily:"'Playfair Display', serif"}}>Erotikmassageliege</h2>
          <p className="text-[#C5A059] text-lg font-medium mb-4">Massage Highlight für jeden Mann</p>
          <p className="text-gray-400 max-w-xl mx-auto">Erleben Sie eine unvergessliche Erotikmassage auf unserer speziellen Massageliege. Lassen Sie sich von unseren erfahrenen Damen verwöhnen.</p>
        </div>
        </>}
      </main>

      {/* FOOTER */}
      <footer className="border-t border-[#333] bg-[#111111] mt-20 py-12 px-4 lg:px-8">
        <div className="max-w-4xl mx-auto text-center text-xs text-gray-500 leading-relaxed">
          <p className="mb-4">
            Die Damen, die in Tübingen ihre Liebes-Dienste anbieten, buchen ein freies Zimmer, ähnlich wie in einem Hotel. Diese Homepage ist lediglich eine Plattform für die selbstständig tätigen Damen, auf der sie sich und ihre Leistungen bewerben. Die Vereinbarung der Leistung und Preise, sowie deren Bezahlung erfolgt ausschließlich direkt mit den Damen in deren Namen und auf deren Rechnung.
          </p>
          <p className="mb-8">
            Alle Servicewünsche bedarf der individuellen Absprache mit der Dame deiner Wahl. Alle hier arbeitenden Frauen unterliegen der Melde- und Steuerpflicht. Bei Mietvertragbeginn werden sie explizit darauf hingewiesen.
          </p>
          <div className="flex flex-wrap justify-center gap-6 mb-6 text-gray-400">
            <a href="#" onClick={(e)=>{e.preventDefault();setView('overview');window.scrollTo(0,0)}} className="hover:text-[#C5A059] transition-colors">Home</a>
            <a href="#" onClick={(e)=>{e.preventDefault();setView('mieterinnen');window.scrollTo(0,0)}} className="hover:text-[#C5A059] transition-colors">Mieterinnen gesucht</a>
            <a href="#" onClick={(e)=>{e.preventDefault();setView('impressum');window.scrollTo(0,0)}} className="hover:text-[#C5A059] transition-colors">Impressum</a>
            <a href="#" onClick={(e)=>{e.preventDefault();setView('datenschutz');window.scrollTo(0,0)}} className="hover:text-[#C5A059] transition-colors">Datenschutzerklärung</a>
          </div>
          <p>&copy; 2026 AmoreHaus. Alle Rechte vorbehalten.</p>
        </div>
      </footer>

      {/* DAME DETAIL MODAL */}
      {selectedDame && <DameModal dame={selectedDame} onClose={() => setSelectedDame(null)} />}
    </div>
  );
}
